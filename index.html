<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجموعة الحزم الكهربائية</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        .logo {
            font-size: 4em;
            margin: 20px 0;
        }
        
        p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .feature {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            color: #333;
        }
        
        .feature-icon {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            margin: 10px;
            transition: background 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1em;
        }
        
        .btn:hover {
            background: #764ba2;
        }
        
        footer {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚡</div>
        <h1>مجموعة الحزم الكهربائية</h1>
        <p>منصة متخصصة في الحلول والخدمات الكهربائية المتقدمة</p>
        
        <div class="features">
            <div class="feature">
                <div class="feature-icon">🔌</div>
                <h3>تركيب احترافي</h3>
            </div>
            <div class="feature">
                <div class="feature-icon">🛠️</div>
                <h3>صيانة دورية</h3>
            </div>
            <div class="feature">
                <div class="feature-icon">⚡</div>
                <h3>كفاءة عالية</h3>
            </div>
            <div class="feature">
                <div class="feature-icon">💡</div>
                <h3>حلول مبتكرة</h3>
            </div>
        </div>
        
        <button class="btn">ابدأ الآن</button>
        <button class="btn">تواصل معنا</button>
        
        <footer>
            <p>&copy; 2026 مجموعة الحزم الكهربائية. جميع الحقوق محفوظة.</p>
        </footer>
    </div>
</body>
</html>
